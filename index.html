<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach Design</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">

    <!-- Desktop Layout -->

    <div class="desktop-layout">

        <img src="Pencil.png" alt="Pencil" class="pencil">

        <div class="content-wrapper">

    <div class="content">

        <img src="logo.svg" alt="Reach Design" class="logo">

        <h1>
            The future of <span>Design</span>
        </h1>

        <h2>
            is under construction.
        </h2>

        <p>
            We're crafting something that'll make pixels jealous
        </p>

    </div>

</div>

        <div class="coming-soon">
            Coming Soon...
        </div>

    </div>

    <!-- Mobile Layout -->

    <div class="mobile-layout">

        <img src="logo.svg" class="mobile-logo" alt="Reach Design">

        <div class="mobile-content">

            <h1>
                The future of <span>Design</span>
            </h1>

            <h2>
                is under construction.
            </h2>

            <p>
                We're crafting something that'll make pixels jealous
            </p>

        </div>

        <div class="mobile-coming">
            Coming Soon...
        </div>

        <img src="Pencil.png" class="mobile-pencil" alt="Pencil">

    </div>

</section>
<script src="script.js"></script>
</body>
</html>
